name: _build_and_test

on:
  workflow_call:
    inputs:
      ref:
        type: string
        required: true
      py_build:
        type: string
        default: "3.14"
      py_test:
        type: string
        default: '["3.14"]'
      coverage:
        type: boolean
        default: false
    outputs:
      dist:
        value: dist

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.py_build }}
          cache: pip
      - run: |
          python -m pip install -U pip build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  test:
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python: ${{ fromJson(inputs.py_test) }}
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: |
          python -m pip install -U pip
          pip install -e ".[test]"
      - run: |
          if [ "${{ inputs.coverage }}" = "true" ] && [ "${{ matrix.python }}" = "${{ inputs.py_build }}" ]; then
            pytest --cov-report=xml
          else
            pytest
          fi
        shell: bash
      - uses: actions/upload-artifact@v4
        if: ${{ inputs.coverage && matrix.python == inputs.py_build }}
        with:
          name: coverage
          path: coverage.xml